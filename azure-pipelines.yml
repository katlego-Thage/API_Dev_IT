trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
# 1. Install NuGet
- task: NuGetToolInstaller@1

# 2. SonarCloud Prepare (MUST be before build)
- task: SonarCloudPrepare@4
  inputs:
    SonarQube: 'SonarCloudConnection'
    organization: 'thagekdev'
    scannerMode: 'MSBuild'           # Changed from 'dotnet' for .NET Framework
    projectKey: 'Git-To-Devops'
    projectName: 'mybooking'

# 3. Restore packages
- task: NuGetCommand@2
  inputs:
    restoreSolution: '$(solution)'

# 4. Build (Sonar scanner wraps this to collect data)
- task: VSBuild@1
  inputs:
    solution: '$(solution)'
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:DesktopBuildPackageLocation="$(build.artifactStagingDirectory)\WebApp.zip" /p:DeployIisAppPath="Default Web Site"'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'

# 5. Run tests
- task: VSTest@2
  inputs:
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'

# 6. SonarCloud Analyze (after build + tests)
- task: SonarCloudAnalyze@4
  inputs:
    jdkversion: 'JAVA_HOME_17_X64'

# 7. SonarCloud Publish
- task: SonarCloudPublish@4
  inputs:
    pollingTimeoutSec: '300'